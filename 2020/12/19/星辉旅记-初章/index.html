        <h1 class="title">星辉旅记 -- 初章</h1>
        <div class="stuff">
            <span>十二月 19, 2020</span>
            

        </div>
        <div class="content markdown">
            <blockquote>
<p>追寻着光的足迹，伴随着风的声音，一个旅人开始了她的旅行故事。她将探寻这个世界的每一个角落，无论是真实，还是虚幻。无论是脚下广袤的土地，无尽的深海，还是头顶上那一片美丽的星空，都将被涉及。一切都将被记录，成为光路上指引他人的光源。</p>
</blockquote>
<p>《星辉旅记 —— 光路》正是为此而诞生的。它将记载星辉徽影的旅行故事，记录世界各地的历史文化，风土人情，自然环境。我相信，它将成为一个参考，成为美好生活的向导。</p>
<p>接下来，请期待旅程的开始吧。</p>
